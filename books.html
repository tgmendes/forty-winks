<title>Books I Read — Forty Winks</title>
<style>
  /* ── Reset & Base ───────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1129;
    --bg-card:   #181c3a;
    --bg-card2:  #1f2347;
    --surface:   #262b54;
    --border:    #2e3461;
    --text:      #e8e6f0;
    --text-dim:  #9b97b8;
    --accent:    #c4a0ff;
    --accent2:   #7b8cff;
    --gold:      #ffd07a;
    --warm:      #ffb07a;
    --success:   #7adca0;
    --danger:    #ff8a8a;
    --radius:    16px;
    --radius-sm: 10px;
    --shadow:    0 4px 24px rgba(0,0,0,.35);
    --max-w:     780px;
    --nav-h:     64px;
  }

  html {
    scroll-behavior: smooth;
    scroll-padding-top: calc(var(--nav-h) + 16px);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: var(--max-w); margin: 0 auto; padding: 0 20px; }

  /* ── Navigation ─────────────────────────────────────── */
  .top-nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: var(--nav-h);
    display: flex; align-items: center;
  }
  .top-nav .container {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
  }
  .nav-logo {
    font-size: 18px; font-weight: 700; color: var(--gold);
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .nav-logo span { font-size: 22px; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a {
    color: var(--text-dim); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 8px;
    transition: all .2s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface); }
  .nav-links a[aria-current="page"] { color: var(--text); background: var(--surface); }

  /* ── Hero ────────────────────────────────────────────── */
  .hero {
    text-align: center;
    padding: 60px 20px 32px;
  }
  .hero-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: inline-block;
    filter: drop-shadow(0 0 24px rgba(255,208,122,.3));
  }
  .hero h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 12px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--gold), var(--warm));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: var(--text-dim);
    font-size: 16px; max-width: 560px; margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Filter chips ───────────────────────────────────── */
  .filter-wrap { padding: 8px 20px 24px; }
  .filter {
    max-width: var(--max-w); margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .filter-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--bg-card);
    color: var(--text-dim);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: linear-gradient(135deg, rgba(196,160,255,.2), rgba(123,140,255,.15));
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Book Card ──────────────────────────────────────── */
  .book {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    transition: border-color .3s, transform .2s;
  }
  .book:hover { border-color: rgba(196,160,255,.25); }
  .book.hidden { display: none; }

  .book-header {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .book-cover {
    flex-shrink: 0;
    width: 64px; height: 88px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800;
    color: rgba(255,255,255,.92);
    letter-spacing: 1px;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    border: 1px solid rgba(255,255,255,.08);
  }
  .cover-purple { background: linear-gradient(135deg, #7b3fbf, #c4a0ff); }
  .cover-blue   { background: linear-gradient(135deg, #2a4fbf, #7b8cff); }
  .cover-gold   { background: linear-gradient(135deg, #b8731f, #ffd07a); }
  .cover-warm   { background: linear-gradient(135deg, #c44a2a, #ffb07a); }
  .cover-green  { background: linear-gradient(135deg, #2d8a5a, #7adca0); }
  .cover-rose   { background: linear-gradient(135deg, #b03a6a, #ff8aae); }
  .cover-teal   { background: linear-gradient(135deg, #1f6b7a, #5fc8d8); }
  .cover-indigo { background: linear-gradient(135deg, #3a3f8f, #8b92e0); }

  .book-meta { flex: 1; min-width: 0; }
  .book-title {
    font-size: 19px; font-weight: 700;
    color: #fff; line-height: 1.25;
    margin-bottom: 4px;
  }
  .book-author {
    font-size: 14px; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .book-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    padding: 3px 9px; border-radius: 100px;
    background: rgba(196,160,255,.1);
    color: var(--accent);
    border: 1px solid rgba(196,160,255,.15);
  }
  .tag-pregnancy { background: rgba(255,138,174,.1); color: #ff8aae; border-color: rgba(255,138,174,.15); }
  .tag-newborn   { background: rgba(255,208,122,.1); color: var(--gold); border-color: rgba(255,208,122,.15); }
  .tag-sleep     { background: rgba(123,140,255,.1); color: var(--accent2); border-color: rgba(123,140,255,.15); }
  .tag-reference { background: rgba(122,220,160,.1); color: var(--success); border-color: rgba(122,220,160,.15); }

  .rec-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    padding: 3px 9px; border-radius: 100px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .rec-yes      { background: rgba(122,220,160,.12); color: var(--success); border: 1px solid rgba(122,220,160,.2); }
  .rec-caveats  { background: rgba(255,208,122,.12); color: var(--gold);    border: 1px solid rgba(255,208,122,.2); }
  .rec-no       { background: rgba(255,138,138,.12); color: var(--danger);  border: 1px solid rgba(255,138,138,.2); }
  .rec-pending  { background: var(--surface);        color: var(--text-dim); border: 1px solid var(--border); }

  /* ── About line ─────────────────────────────────────── */
  .book-about {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--bg-card2);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .book-about strong {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* ── Expandable Blocks ──────────────────────────────── */
  .expand-block { margin-bottom: 8px; }
  .expand-toggle {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .expand-toggle:hover { background: var(--surface); }
  .expand-toggle .chevron {
    transition: transform .3s;
    color: var(--text-dim);
    font-size: 11px;
  }
  .expand-block.open .expand-toggle { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .expand-block.open .chevron { transform: rotate(180deg); }
  .expand-body {
    display: none;
    padding: 14px 16px 16px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
  }
  .expand-block.open .expand-body { display: block; }

  /* ── My take styling ────────────────────────────────── */
  .take-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .take-row { }
  .take-label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .take-row ul {
    list-style: none; padding: 0;
  }
  .take-row li {
    position: relative;
    padding: 4px 0 4px 18px;
    font-size: 15px;
    line-height: 1.55;
  }
  .take-row li::before {
    content: '';
    position: absolute; left: 2px; top: 12px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: .6;
  }
  .take-liked .take-label { color: var(--success); }
  .take-liked li::before { background: var(--success); }
  .take-disliked .take-label { color: var(--warm); }
  .take-disliked li::before { background: var(--warm); }

  .take-pending {
    padding: 16px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    font-style: italic;
  }
  .take-pending strong { color: var(--gold); font-style: normal; }

  /* ── Links row ──────────────────────────────────────── */
  .book-links {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 16px;
  }
  .book-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--bg-card2);
    transition: all .2s;
  }
  .book-link:hover {
    border-color: var(--accent);
    background: var(--surface);
  }
  .book-link::after { content: '\2192'; }

  /* ── Footer ─────────────────────────────────────────── */
  .footer {
    text-align: center;
    padding: 48px 20px 32px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.7;
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer-heart { color: var(--warm); }

  /* ── Responsive ─────────────────────────────────────── */
  @media (max-width: 600px) {
    body { font-size: 16px; }
    .nav-links a { font-size: 12px; padding: 6px 10px; }
    .hero { padding: 40px 16px 24px; }
    .book { padding: 20px 18px; }
    .book-cover { width: 56px; height: 76px; font-size: 18px; }
    .book-header { gap: 14px; }
    .rec-badge { margin-left: 0; margin-top: 6px; }
    .book-tags { flex-wrap: wrap; }
  }

  /* ── Scroll fade-in ─────────────────────────────────── */
  .fade-in { opacity: 0; transform: translateY(12px); transition: opacity .5s ease, transform .5s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
</style>
</head>

// ─────────────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────────────

const TAG_LABELS = {
  pregnancy: 'Pregnancy',
  newborn: 'Newborn',
  sleep: 'Sleep',
  reference: 'Reference'
};

const REC_BADGE = {
  'yes':           { cls: 'rec-yes',     label: '★ Recommend' },
  'with-caveats':  { cls: 'rec-caveats', label: '★ With caveats' },
  'no':            { cls: 'rec-no',      label: 'Skip it' }
};

function renderTags(tags) {
  return tags.map(t => `<span class="tag tag-${t}">${TAG_LABELS[t] || t}</span>`).join('');
}

function renderRecBadge(review) {
  if (!review || !review.recommend) {
    return '<span class="rec-badge rec-pending">Review pending</span>';
  }
  const r = REC_BADGE[review.recommend];
  return r ? `<span class="rec-badge ${r.cls}">${r.label}</span>` : '';
}

function renderTake(review) {
  if (!review) {
    return `
      <div class="take-pending">
        <strong>TODO:</strong> personal review &mdash; coming soon.
      </div>`;
  }
  const rows = [];
  if (review.bestFor) {
    rows.push(`
      <div class="take-row">
        <div class="take-label">&#127919; Best for</div>
        <div>${review.bestFor}</div>
      </div>`);
  }
  if (review.liked && review.liked.length) {
    rows.push(`
      <div class="take-row take-liked">
        <div class="take-label">&#43; What I liked</div>
        <ul>${review.liked.map(x => `<li>${x}</li>`).join('')}</ul>
      </div>`);
  }
  if (review.disliked && review.disliked.length) {
    rows.push(`
      <div class="take-row take-disliked">
        <div class="take-label">&minus; What I didn’t</div>
        <ul>${review.disliked.map(x => `<li>${x}</li>`).join('')}</ul>
      </div>`);
  }
  if (review.verdict) {
    rows.push(`
      <div class="take-row">
        <div class="take-label">&#9998; Verdict</div>
        <div>${review.verdict}</div>
      </div>`);
  }
  if (!rows.length) {
    return `<div class="take-pending"><strong>TODO:</strong> personal review &mdash; coming soon.</div>`;
  }
  return `<div class="take-grid">${rows.join('')}</div>`;
}

function renderLinks(links) {
  if (!links || !links.length) return '';
  return `
    <div class="book-links">
      ${links.map(l => `<a class="book-link" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}
    </div>`;
}

function renderBook(book) {
  return `
    <article class="book fade-in" data-tags="${book.tags.join(' ')}" id="${book.id}">
      <div class="book-header">
        <div class="book-cover ${book.cover}">${book.initials}</div>
        <div class="book-meta">
          <div class="book-title">${book.title}</div>
          <div class="book-author">${book.author}</div>
          <div class="book-tags">${renderTags(book.tags)}</div>
        </div>
        ${renderRecBadge(book.review)}
      </div>

      <div class="book-about">
        <strong>What it’s about</strong>
        ${book.about}
      </div>

      <div class="expand-block">
        <button class="expand-toggle" aria-expanded="false">
          Synopsis <span class="chevron">&#9660;</span>
        </button>
        <div class="expand-body">${book.synopsis}</div>
      </div>

      <div class="expand-block">
        <button class="expand-toggle" aria-expanded="false">
          Why it helps parents <span class="chevron">&#9660;</span>
        </button>
        <div class="expand-body">${book.whyItHelps}</div>
      </div>

      <div class="expand-block">
        <button class="expand-toggle" aria-expanded="false">
          My take <span class="chevron">&#9660;</span>
        </button>
        <div class="expand-body">${renderTake(book.review)}</div>
      </div>

      ${renderLinks(book.links)}
    </article>`;
}

const listEl = document.getElementById('book-list');
listEl.innerHTML = BOOKS.map(renderBook).join('');

// Expand/collapse
listEl.addEventListener('click', e => {
  const btn = e.target.closest('.expand-toggle');
  if (!btn) return;
  const block = btn.closest('.expand-block');
  const open = block.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
});

// Filter
const filterEl = document.getElementById('filter');
filterEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filterEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tag = btn.dataset.tag;
  document.querySelectorAll('.book').forEach(book => {
    const tags = (book.dataset.tags || '').split(' ');
    book.classList.toggle('hidden', tag !== 'all' && !tags.includes(tag));
  });
});

// Fade-in
const fadeObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      fadeObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.fade-in').forEach(el => fadeObserver.observe(el));
</script>
